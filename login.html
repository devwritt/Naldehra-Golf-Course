<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Member Login</title>

<link rel="stylesheet" href="style.css">

<style>

.login-page{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f5f5f5;
}

.login-box{

    background:white;

    padding:40px;

    width:400px;

    border-radius:10px;

    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.login-box h2{

    text-align:center;

    color:#0b3d2e;

    margin-bottom:25px;
}

.login-box input{

    width:100%;

    padding:12px;

    margin-bottom:15px;
}

.login-box button{

    width:100%;

    background:#0b3d2e;

    color:white;

    padding:12px;

    border:none;

    cursor:pointer;
}

.register-btn{

    display:block;

    text-align:center;

    margin-top:15px;

    color:#0b3d2e;

    text-decoration:none;

    font-weight:bold;
}

.back-home{

    display:block;

    text-align:center;

    margin-top:20px;
}

</style>

</head>

<body>

<div class="login-page">

<div class="login-box">

<h2>Member Login</h2>

<form>

<input type="text"
       placeholder="Membership ID"
       required>

<input type="password"
       placeholder="Password"
       required>

<button type="submit">

Login

</button>

</form>

<a href="register.html"
   class="register-btn">

Not a Member? Register Here

</a>

<a href="#"
   class="register-btn">

Forgot Password?

</a>

<a href="index.html"
   class="back-home">

← Back to Home

</a>

</div>

</div>

</body>

</html>
