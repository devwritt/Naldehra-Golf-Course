<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet" href="style.css">

<style>

.reset-page{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f5f5f5;
}

.reset-box{

    width:450px;

    background:white;

    padding:40px;

    border-radius:10px;

    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

.reset-box h2{

    text-align:center;

    color:#0b3d2e;

    margin-bottom:20px;
}

.reset-box p{

    text-align:center;

    margin-bottom:25px;
}

.reset-box input{

    width:100%;

    padding:12px;

    margin-bottom:15px;
}

.reset-box button{

    width:100%;

    background:#0b3d2e;

    color:white;

    border:none;

    padding:12px;

    cursor:pointer;
}

.back-link{

    display:block;

    text-align:center;

    margin-top:20px;
}

</style>

</head>

<body>

<div class="reset-page">

<div class="reset-box">

<h2>Reset Password</h2>

<p>
Enter your registered Email ID or Mobile Number.
</p>

<form>

<input
type="text"
placeholder="Email ID or Mobile Number"
required>

<button type="submit">

Send Reset Link

</button>

</form>

<a href="login.html" class="back-link">

← Back to Login

</a>

</div>

</div>

</body>

</html>
